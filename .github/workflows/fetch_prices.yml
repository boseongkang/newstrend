name: fetch-prices

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 월~금 21:30 UTC = 미장 마감 후 (16:30 ET)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance pandas

      - name: Download previous prices artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: fetch-prices.yml
          name: prices
          path: prev_prices
          if_no_artifact_found: ignore

      - name: Restore previous prices
        run: |
          mkdir -p site/data
          if [ -f prev_prices/prices.json ]; then
            cp prev_prices/prices.json site/data/prices.json
            echo "Restored previous prices.json"
          fi

      - name: Fetch latest prices
        run: |
          python scripts/fetch_prices.py \
            --days 180 \
            --out site/data/prices.json

      - name: Upload prices artifact
        uses: actions/upload-artifact@v4
        with:
          name: prices
          path: site/data/prices.json
          retention-days: 7

      - name: Commit to site/data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/prices.json
          if git diff --cached --quiet; then
            echo "No price changes"
          else
            git commit -m "data: update prices.json $(date -u +%Y-%m-%d)"
            git push origin main
          fi