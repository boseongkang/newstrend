name: fetch-prices

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      full_reload:
        description: "Full reload"
        type: boolean
        default: false
      since:
        description: "YYYY-MM-DD"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      # ── 전체 히스토리 받기 (rebase에 필수) ────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet yfinance pandas

      # ── data-cache CSV 복원 (인덱스 오염 방지 → git restore 사용) ─────────
      - name: Restore price CSVs from data-cache
        run: |
          mkdir -p data/prices
          git fetch origin data-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/data-cache 2>/dev/null; then
            # --worktree: 파일만 복원, 인덱스는 건드리지 않음
            git restore --worktree --source=origin/data-cache -- data/prices/ 2>/dev/null || \
            git checkout origin/data-cache -- data/prices/ 2>/dev/null || true
            # checkout이 실행됐을 경우를 대비해 인덱스에서 제거
            git reset HEAD data/prices/ 2>/dev/null || true
            echo "Restored: $(ls data/prices/*.csv 2>/dev/null | wc -l) CSV files"
          fi

      # ── 증분 fetch ──────────────────────────────────────────────────────────
      - name: Fetch latest prices
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.full_reload }}" = "true" ]; then
            EXTRA="--full-reload"
          elif [ -n "${{ github.event.inputs.since }}" ]; then
            EXTRA="--since ${{ github.event.inputs.since }}"
          fi
          python scripts/fetch_prices_v2.py \
            --price-dir data/prices \
            --out-json  site/data/prices.json \
            --out-meta  site/data/prices_meta.json \
            --last-days 365 \
            $EXTRA

      # ── TA 계산 ─────────────────────────────────────────────────────────────
      - name: Run technical analysis
        run: |
          python scripts/analyze_prices.py \
            --prices site/data/prices.json \
            --trends site/data/trends.json \
            --out-json     site/data/technical_analysis.json \
            --out-summary  site/data/ta_summary.json \
            --out-csv-dir  run || true

      # ── CSV → data-cache (worktree 격리) ────────────────────────────────────
      - name: Save price CSVs to data-cache
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # main 작업 디렉토리의 CSV를 /tmp에 백업
          cp -r data/prices /tmp/prices_backup

          # worktree로 data-cache만 격리된 디렉토리에 체크아웃
          rm -rf /tmp/cache-worktree
          if git ls-remote --heads origin data-cache | grep -q data-cache; then
            git worktree add /tmp/cache-worktree data-cache
          else
            git worktree add /tmp/cache-worktree -b data-cache
          fi

          # 백업한 CSV를 worktree에 복사
          mkdir -p /tmp/cache-worktree/data/prices
          cp -r /tmp/prices_backup/. /tmp/cache-worktree/data/prices/

          cd /tmp/cache-worktree
          rm -f .gitignore  # worktree 자체의 .gitignore 제거
          git add data/prices/
          if ! git diff --cached --quiet; then
            git commit -m "prices: $(date -u +%Y-%m-%d)"
            git push origin data-cache
          fi

      # ── main 작업 디렉토리 정리 → JSON만 커밋 ──────────────────────────────
      - name: Commit prices JSON to main
        run: |
          cd "$GITHUB_WORKSPACE"
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 핵심: data/prices/는 main에 들어가면 안 됨 → 체크아웃으로 원복
          git checkout HEAD -- data/prices/ 2>/dev/null || true
          # 추적되지 않는 파일도 제거 (manifest.json 등)
          rm -rf data/prices

          # 명시적으로 JSON 요약본만 스테이징
          git add site/data/prices.json \
                  site/data/prices.json.gz \
                  site/data/prices_meta.json \
                  site/data/technical_analysis.json \
                  site/data/technical_analysis.json.gz \
                  site/data/ta_summary.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
            exit 0
          fi

          git commit -m "data: prices + TA update $(date -u +%Y-%m-%d)"

          # 원격 상태와 동기화 (작업 트리 clean 상태라 rebase 안전)
          git pull --rebase origin main || git pull --no-rebase origin main
          git push origin HEAD:main