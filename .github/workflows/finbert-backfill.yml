name: finbert-backfill

# One-time / occasional backfill of data/sentiment_per_day/ on the data-cache branch.
# Scores ALL of the last N days (default 30) regardless of cache, then pushes to data-cache.
# Run manually via workflow_dispatch when:
#   - first time setting up the per-day cache
#   - the daily incremental run fell behind (e.g. cancelled mid-fill)

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many recent days to score"
        required: false
        default: "30"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install -q "torch>=2.2" "transformers>=4.38" "tokenizers>=0.15"

      - name: Get latest warehouse run id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RID=$(gh run list --workflow update-warehouse.yml --branch main --status success --json databaseId -q '.[0].databaseId')
          echo "RUN_ID=$RID" >> $GITHUB_ENV

      - name: Download warehouse artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh run download "$RUN_ID" -n warehouse -D artifacts

      - name: Extract warehouse
        run: |
          set -euo pipefail
          mkdir -p data/warehouse
          if ls artifacts/*.zip >/dev/null 2>&1; then unzip -o artifacts/*.zip -d artifacts >/dev/null; fi
          if [ -f artifacts/artifact.tar ]; then tar -xf artifacts/artifact.tar -C artifacts; fi
          if [ -d artifacts/warehouse ]; then
            rsync -a artifacts/warehouse/ data/warehouse/
          elif [ -d artifacts/daily ]; then
            mkdir -p data/warehouse/daily
            rsync -a artifacts/daily/ data/warehouse/daily/
          fi
          test -d data/warehouse/daily

      - name: Cache HuggingFace models (FinBERT)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-prosusai-finbert-v1

      - name: Restore existing sentiment_per_day from data-cache
        run: |
          mkdir -p data/sentiment_per_day
          git fetch origin data-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/data-cache 2>/dev/null; then
            git restore --worktree --source=origin/data-cache -- data/sentiment_per_day/ 2>/dev/null || true
            git reset HEAD data/sentiment_per_day/ 2>/dev/null || true
          fi
          CACHED=$(ls data/sentiment_per_day/sentiment_*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "Existing cache: $CACHED day(s)"

      - name: FinBERT — backfill score (force, last ${{ github.event.inputs.days }} days)
        run: |
          set -euo pipefail
          DAYS="${{ github.event.inputs.days }}"
          DAYS="${DAYS:-30}"
          mkdir -p data/sentiment_per_day
          PROCESSED=0
          SKIPPED=0
          for f in $(ls data/warehouse/daily/*.jsonl 2>/dev/null | grep -v '_tokens\.jsonl' | sort | tail -"$DAYS"); do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            date=$(echo "$name" | sed -E 's/^([0-9]{4}-[0-9]{2}-[0-9]{2}).*/\1/')
            [ -z "$date" ] && continue
            out="data/sentiment_per_day/sentiment_${date}.json"
            if [ -s "$out" ]; then
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            python scripts/sentiment_finbert.py \
              --input "$f" \
              --output "$out" \
              --batch-size 16 || true
            PROCESSED=$((PROCESSED + 1))
          done
          echo "Backfill scored $PROCESSED day(s), skipped $SKIPPED already-cached day(s)"

      - name: Push sentiment_per_day to data-cache
        run: |
          set -e
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/cache-worktree
          git worktree prune || true
          git fetch origin data-cache:refs/remotes/origin/data-cache 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/data-cache; then
            git worktree add /tmp/cache-worktree origin/data-cache
            (cd /tmp/cache-worktree && git checkout -B data-cache)
          else
            git worktree add /tmp/cache-worktree -b data-cache
          fi

          mkdir -p /tmp/cache-worktree/data/sentiment_per_day
          cp -r data/sentiment_per_day/. /tmp/cache-worktree/data/sentiment_per_day/ 2>/dev/null || true

          cd /tmp/cache-worktree
          rm -f .gitignore
          git add data/sentiment_per_day/
          if git diff --cached --quiet; then
            echo "No sentiment changes to push"
            exit 0
          fi
          git commit -m "sentiment_per_day backfill: $(date -u +%Y-%m-%d)"
          git push origin data-cache

          cd "$GITHUB_WORKSPACE"
          git worktree remove --force /tmp/cache-worktree 2>/dev/null || true
