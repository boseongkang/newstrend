name: trend-site

on:
  workflow_dispatch:
  schedule:
    - cron: "25 7 * * *"
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "site/**"
      - "config/**"
      - ".github/workflows/trend-site.yml"
  workflow_run:
    workflows: ["update-warehouse", "fetch-prices"]
    types: [completed]

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install yfinance pandas numpy orjson pyyaml || true

      - name: Get latest warehouse run id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RID=$(gh run list --workflow update-warehouse.yml --branch main --status success --json databaseId -q '.[0].databaseId')
          echo "RUN_ID=$RID" >> $GITHUB_ENV

      - name: Download warehouse artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh run download "$RUN_ID" -n warehouse -D artifacts

      - name: Extract warehouse
        run: |
          set -euo pipefail
          mkdir -p data/warehouse
          if ls artifacts/*.zip >/dev/null 2>&1; then unzip -o artifacts/*.zip -d artifacts >/dev/null; fi
          if [ -f artifacts/artifact.tar ]; then tar -xf artifacts/artifact.tar -C artifacts; fi
          if [ -d artifacts/warehouse ]; then
            rsync -a artifacts/warehouse/ data/warehouse/
          elif [ -d artifacts/daily ]; then
            mkdir -p data/warehouse/daily
            rsync -a artifacts/daily/ data/warehouse/daily/
          elif [ -d artifacts/artifacts ]; then
            rsync -a artifacts/artifacts/ data/
          fi
          test -d data/warehouse/daily
          ls -lt data/warehouse/daily | head -n 8 || true

      - name: Preserve raw news to data-cache
        run: |
          set -e
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 깨끗한 시작 - 기존 worktree 정리
          rm -rf /tmp/news-archive
          git worktree prune || true

          # data-cache 브랜치 fetch
          git fetch origin data-cache:refs/remotes/origin/data-cache 2>/dev/null || true

          # worktree 추가 (실패하면 명시적으로 에러)
          if git show-ref --verify --quiet refs/remotes/origin/data-cache; then
            git worktree add /tmp/news-archive origin/data-cache
            (cd /tmp/news-archive && git checkout -B data-cache)
          else
            git worktree add /tmp/news-archive -b data-cache
          fi

          # 검증
          if [ ! -d /tmp/news-archive/.git ] && [ ! -f /tmp/news-archive/.git ]; then
            echo "ERROR: worktree creation failed"
            exit 1
          fi

          # raw JSONL 누적 (없는 파일만 복사)
          mkdir -p /tmp/news-archive/data/news_archive
          NEW_COUNT=0
          for f in data/warehouse/daily/*.jsonl; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            case "$name" in
              *_tokens.jsonl) continue ;;
            esac
            dst="/tmp/news-archive/data/news_archive/$name"
            if [ ! -f "$dst" ]; then
              cp "$f" "$dst"
              echo "Archived: $name"
              NEW_COUNT=$((NEW_COUNT + 1))
            fi
          done

          echo "New files: $NEW_COUNT"
          if [ "$NEW_COUNT" -eq 0 ]; then
            echo "No new news to preserve"
            exit 0
          fi

          # worktree 안에서 git 명령
          cd /tmp/news-archive
          rm -f .gitignore
          git add data/news_archive/
          git commit -m "news: preserve $NEW_COUNT new days $(date -u +%Y-%m-%d)"
          git push origin data-cache

          # Cleanup
          cd "$GITHUB_WORKSPACE"
          git worktree remove --force /tmp/news-archive 2>/dev/null || true
          git worktree prune

      - name: Convert csv/jsonl to *_tokens.jsonl
        run: |
          set -euo pipefail
          python scripts/csv_to_tokens.py
          DT=$(ls data/warehouse/daily/*_tokens.jsonl | sed -E 's#.*/([0-9]{4}-[0-9]{2}-[0-9]{2})_tokens\.jsonl#\1#' | sort | tail -n1 || true)
          [ -n "$DT" ] && echo "LATEST_TOKENS=$DT" >> $GITHUB_ENV || true

      - name: Mirror *_tokens.jsonl -> *_tokens.csv
        run: |
          set -euo pipefail
          python scripts/tokens_jsonl_to_csv.py

      - name: Aggregate from warehouse
        run: |
          python scripts/aggregate_from_warehouse.py \
            --warehouse data/warehouse/daily \
            --out run \
            --last-days 7 \
            --min-len 4 \
            --extra-stop config/extra_noise.txt

      - name: Build static pages
        run: |
          python scripts/build_static_ui.py --run run --out site
          test -s site/index.html
          test -s site/report.html
          test -s site/rising.html

      - name: Build trends.json (rich schema)
        run: |
          python scripts/make_trends_json.py \
            --tokens-dir data/warehouse/daily \
            --out site/data/trends.json \
            --last-days 180 \
            --topk 200 \
            --min-len 4
          test -s site/data/trends.json

      - name: Build DOW / weekly / monthly aggregations
        run: |
          python scripts/make_trend_aggregations.py \
            --trends site/data/trends.json \
            --outdir site/data \
            --topk 200
          test -s site/data/trends_dow.json
          test -s site/data/trends_weekly.json
          test -s site/data/trends_monthly.json

      - name: Overwrite index with custom dashboard
        run: cp site/index_custom.html site/index.html

      - name: Restore price CSVs from data-cache
        run: |
          mkdir -p data/prices
          git fetch origin data-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/data-cache 2>/dev/null; then
            git restore --worktree --source=origin/data-cache -- data/prices/ 2>/dev/null || true
            git reset HEAD data/prices/ 2>/dev/null || true
          fi

      - name: Fetch prices (incremental)
        run: |
          python scripts/fetch_prices_v2.py \
            --price-dir data/prices \
            --out-json  site/data/prices.json \
            --out-meta  site/data/prices_meta.json \
            --last-days 365 || true

      - name: Run technical analysis
        run: |
          python scripts/analyze_prices.py \
            --prices      site/data/prices.json \
            --trends      site/data/trends.json \
            --out-json    site/data/technical_analysis.json \
            --out-summary site/data/ta_summary.json \
            --out-csv-dir run || true
          gzip -f -k site/data/technical_analysis.json || true

      - name: Build signal correlations
        run: |
          python scripts/build_signal_corr.py \
            --trends site/data/trends.json \
            --prices site/data/prices.json \
            --out    site/data/signal_corr.json \
            --top-terms 200 \
            --min-corr 0.25 \
            --min-events 3 || true

      # FinBERT scoring runs LOCALLY on M3 MPS (~52x faster than CI CPU);
      # see scripts/sentiment_finbert_local.py. CI just restores the cache
      # already pushed to data-cache and aggregates it for the site.
      - name: Restore sentiment_per_day from data-cache
        run: |
          mkdir -p data/sentiment_per_day
          git fetch origin data-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/data-cache 2>/dev/null; then
            git restore --worktree --source=origin/data-cache -- data/sentiment_per_day/ 2>/dev/null || true
            git reset HEAD data/sentiment_per_day/ 2>/dev/null || true
          fi
          CACHED=$(ls data/sentiment_per_day/sentiment_*.json 2>/dev/null | wc -l | tr -d ' ')
          echo "sentiment_per_day cache: $CACHED day(s) restored"
          if [ "$CACHED" = "0" ]; then
            echo "::warning::no sentiment_per_day cache on data-cache. Run scripts/sentiment_finbert_local.py --commit locally to seed."
          fi

      - name: Restore local FinBERT run metadata from data-cache
        run: |
          mkdir -p site/data
          if git show-ref --verify refs/remotes/origin/data-cache 2>/dev/null; then
            git restore --worktree --source=origin/data-cache -- data/local_runs.json 2>/dev/null || true
            git reset HEAD data/local_runs.json 2>/dev/null || true
          fi
          if [ -f data/local_runs.json ]; then
            cp data/local_runs.json site/data/local_runs.json
            echo "local_runs.json restored: $(cat site/data/local_runs.json)"
          else
            echo "no local_runs.json yet on data-cache (local launchd hasn't run with the metadata patch)"
          fi

      - name: Aggregate ticker sentiment
        run: |
          set -euo pipefail
          python scripts/aggregate_ticker_sentiment.py \
            --inputs 'data/sentiment_per_day/sentiment_*.json' \
            --output site/data/ticker_sentiment.json \
            --min-articles 5 || true
          if [ -s site/data/ticker_sentiment.json ]; then
            python -c "import json; d=json.load(open('site/data/ticker_sentiment.json')); dates=d.get('dates',[]); print(f'ticker_sentiment.json: dates={len(dates)} tickers={len(d.get(\"tickers\",{}))} latest={dates[-1] if dates else None}')"
          fi

      - name: Build fundamentals (SEC EDGAR Pillar 4)
        env:
          SEC_USER_AGENT: "Newstrend-CI ci@newstrend.local"
        run: |
          python scripts/build_fundamentals.py || true

      - name: Analyze ticker patterns
        run: |
          python scripts/analyze_ticker.py \
            --trends     site/data/trends.json \
            --prices     site/data/prices.json \
            --out-dir    site/data/ticker_analysis \
            --tickers    AAPL,MSFT,NVDA,GOOGL,META,AMZN,TSLA,AMD,INTC,AVGO,QCOM,ASML,MU,NXPI,JPM,BAC,GS,MS,BLK,XOM,CVX,SPY,QQQ,IWM,DIA,TLT,GLD,USO \
            --min-events 3 \
            --z-thresh   0.8 \
            --lag-range  2 || true

      - name: Learn ticker weights
        run: |
          python scripts/learn_ticker_weights.py \
            --prices       site/data/prices.json \
            --ta           site/data/technical_analysis.json \
            --trends       site/data/trends.json \
            --analysis-dir site/data/ticker_analysis \
            --out          site/data/ticker_weights.json \
            --hold-days    5 || true

      - name: Generate predictions
        run: |
          python scripts/predict.py \
            --ta           site/data/technical_analysis.json \
            --signals      site/data/signal_corr.json \
            --trends       site/data/trends.json \
            --analysis-dir site/data/ticker_analysis \
            --weights      site/data/ticker_weights.json \
            --out          site/data/predictions.json || true

      - name: Find hidden gems (4-Pillar synthesis)
        run: |
          python scripts/find_hidden_gems.py --top 30 || true

      - name: Build domino chains (time-aware quality + weekly snapshot)
        run: |
          python scripts/find_domino_chains.py || true

      - name: Run backtest (V1 + V2)
        run: |
          python scripts/backtest.py \
            --trends site/data/trends.json \
            --prices site/data/prices.json \
            --out    site/data/backtest.json || true
          python scripts/backtest_v2.py \
            --trends site/data/trends.json \
            --prices site/data/prices.json \
            --prev   site/data/backtest.json \
            --out    site/data/backtest_v2.json || true

      - name: Run daily verification
        run: |
          python scripts/daily_verify.py \
            --pred-dir site/data/predictions_history \
            --prices   site/data/prices.json \
            --out      site/data/verification/daily.json || true

      - name: Generate weekly report
        run: |
          python scripts/weekly_report.py \
            --prices       site/data/prices.json \
            --pred-dir     site/data/predictions_history \
            --current-pred site/data/predictions.json \
            --analysis-dir site/data/ticker_analysis \
            --out-dir      site/data/reports \
            --lookback-days 14 \
            --hold-days    5 || true

      - name: Save price CSVs to data-cache
        run: |
          set -e
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 깨끗한 시작 - 이전 worktree 정리
          rm -rf /tmp/cache-worktree
          git worktree remove --force /tmp/news-archive 2>/dev/null || true
          git worktree prune || true

          # data-cache 브랜치 fetch (최신화)
          git fetch origin data-cache:refs/remotes/origin/data-cache 2>/dev/null || true

          # worktree 추가 (실패시 명시적 에러)
          if git show-ref --verify --quiet refs/remotes/origin/data-cache; then
            git worktree add /tmp/cache-worktree origin/data-cache
            (cd /tmp/cache-worktree && git checkout -B data-cache)
          else
            git worktree add /tmp/cache-worktree -b data-cache
          fi

          # 검증
          if [ ! -d /tmp/cache-worktree/.git ] && [ ! -f /tmp/cache-worktree/.git ]; then
            echo "ERROR: worktree creation failed"
            exit 1
          fi

          mkdir -p /tmp/cache-worktree/data/prices
          cp -r data/prices/. /tmp/cache-worktree/data/prices/ 2>/dev/null || true

          # sentiment_per_day is owned by the local FinBERT runner, not CI.
          # Don't push it from here — would race with local pushes.
          cd /tmp/cache-worktree
          rm -f .gitignore
          git add data/prices/
          if git diff --cached --quiet; then
            echo "No price changes to push"
            exit 0
          fi

          git commit -m "prices: $(date -u +%Y-%m-%d)"
          git push origin data-cache

          # Cleanup
          cd "$GITHUB_WORKSPACE"
          git worktree remove --force /tmp/cache-worktree 2>/dev/null || true
          git worktree prune

      - name: Commit predictions history to main
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1) 변경사항 없으면 종료
          git add site/data/predictions_history/ site/data/reports/ \
                  site/data/trends.json site/data/ticker_sentiment.json \
                  site/data/trends_dow.json site/data/trends_weekly.json \
                  site/data/trends_monthly.json \
                  site/data/hidden_gems.json site/data/predictions.json \
                  site/data/signal_corr.json site/data/backtest.json \
                  site/data/backtest_v2.json site/data/verification/ \
                  site/data/ticker_weights.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No history changes to commit"
            exit 0
          fi

          # 2) 다른 unstaged 변경 모두 stash (rebase 가능하게)
          git stash --include-untracked --keep-index 2>/dev/null || true

          # 3) commit
          git commit -m "data: archive predictions $(date -u +%Y-%m-%d)"

          # 4) 재시도 로직: rebase + push, 충돌 시 최대 5회 재시도
          for i in 1 2 3 4 5; do
            git pull --rebase --strategy-option=ours origin main && \
            git push origin HEAD:main && break
            echo "Attempt $i failed, retrying..."
            sleep $((RANDOM % 5 + 1))
          done

          # 5) stash 복구 (무시해도 됨)
          git stash pop 2>/dev/null || true
          echo "Done"

      - name: Build macro themes
        run: |
          python scripts/macro_themes.py \
            --trends site/data/trends.json \
            --out    site/data/macro_themes.json || true

      - name: Build tickers.json (sectors)
        run: |
          python scripts/make_ticker_sectors.py --map config/ticker_aliases.json --out site/data/tickers.json || true

      - name: Self-correcting — paper trading replay
        run: |
          python scripts/paper_trade.py || true

      - name: Self-correcting — prediction accuracy tracker
        run: |
          python scripts/prediction_tracker.py || true

      - name: Self-correcting — gap analyzer
        run: |
          python scripts/gap_analyzer.py || true

      - name: Self-correcting — adaptive calibration
        run: |
          python scripts/adaptive_calibration.py || true

      - name: ML — feature engineering
        run: |
          python scripts/feature_engineering.py || true

      - name: ML — baseline benchmark (4-model)
        run: |
          python scripts/ml_baseline.py || true

      - name: Weekly — meta-analysis + improvement plan
        run: |
          python scripts/weekly_analyzer.py || true

      - name: Phase 0 — validation (measurement only)
        run: |
          python scripts/validate.py --ci || true

      - name: ML monitor — forward alpha tracker
        run: |
          python scripts/ml_monitor.py --status || true

      - name: Generate site/data/health.json
        env:
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, datetime
          from pathlib import Path

          def git(*args):
              try:
                  return subprocess.check_output(['git', *args], stderr=subprocess.DEVNULL).decode().strip()
              except subprocess.CalledProcessError:
                  return ''

          dc_sha  = git('rev-parse', 'origin/data-cache')
          dc_iso  = git('log', '-1', '--format=%cI', 'origin/data-cache')
          dc_subj = git('log', '-1', '--format=%s',  'origin/data-cache')

          sent_dir = Path('data/sentiment_per_day')
          sent_files = sorted(p.name for p in sent_dir.glob('sentiment_*.json')) if sent_dir.is_dir() else []

          phist_dir = Path('site/data/predictions_history')
          phist = sorted(phist_dir.glob('*.json')) if phist_dir.is_dir() else []
          latest_pred = phist[-1].relative_to('site').as_posix() if phist else None

          out = {
              'ci_run_at':  datetime.datetime.utcnow().isoformat(timespec='seconds') + 'Z',
              'ci_run_id':  os.environ.get('GH_RUN_ID'),
              'ci_run_url': os.environ.get('GH_RUN_URL'),
              'ci_sha':     (os.environ.get('GH_SHA') or '')[:40],
              'data_cache_head': ({
                  'sha': dc_sha[:40],
                  'committed_at': dc_iso,
                  'subject': dc_subj,
              } if dc_sha else None),
              'sentiment_cache': {
                  'count':    len(sent_files),
                  'earliest': sent_files[0][len('sentiment_'):-len('.json')] if sent_files else None,
                  'latest':   sent_files[-1][len('sentiment_'):-len('.json')] if sent_files else None,
              },
              'latest_predictions_path': latest_pred,
          }
          Path('site/data/health.json').write_text(json.dumps(out, indent=2))
          print(json.dumps(out, indent=2))
          PY

      - name: Commit self-correcting outputs to main
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add site/data/paper_trading_history.json \
                  site/data/prediction_accuracy.json \
                  site/data/pillar_weights.json \
                  site/data/calibration_history.json \
                  site/data/gap_analysis.json \
                  site/data/gap_history.json \
                  site/data/ml_baseline.json \
                  site/data/weekly_analysis.json \
                  site/data/weekly_history.json \
                  site/data/macro_themes.json \
                  site/data/tickers.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No self-correcting changes to commit"
            exit 0
          fi

          git stash --include-untracked --keep-index 2>/dev/null || true
          git commit -m "data: self-correcting paper-trade + calibration $(date -u +%Y-%m-%d)"

          for i in 1 2 3 4 5; do
            git pull --rebase --strategy-option=ours origin main && \
            git push origin HEAD:main && break
            echo "Attempt $i failed, retrying..."
            sleep $((RANDOM % 5 + 1))
          done

          git stash pop 2>/dev/null || true
          echo "Done"

      - name: Copy daily files into site
        run: |
          set -euo pipefail
          mkdir -p site/data/daily
          rsync -a data/warehouse/daily/*.jsonl site/data/daily/ 2>/dev/null || true
          rsync -a data/warehouse/daily/*_tokens.jsonl site/data/daily/ 2>/dev/null || true
          rsync -a data/warehouse/daily/*.jsonl.gz site/data/daily/ 2>/dev/null || true

      - name: Build aggregate entities_daily.jsonl
        run: |
          set -euo pipefail
          python scripts/build_entities_daily.py

      - name: Duplicate aggregate to legacy paths
        run: |
          set -euo pipefail
          cp -f site/data/entities_daily.jsonl site/entities_daily.jsonl || true
          cp -f site/data/entities_daily.jsonl site/data/entities.jsonl || true
          gzip -f -k site/data/entities_daily.jsonl
          gzip -f -k site/entities_daily.jsonl
          gzip -f -k site/data/entities.jsonl

      - name: Determine latest date and export
        run: |
          set -euo pipefail
          LATEST=$(ls site/data/daily/*.jsonl* 2>/dev/null | sed -E 's#.*/([0-9]{4}-[0-9]{2}-[0-9]{2}).*#\1#' | sort | tail -n1 || true)
          if [ -z "${LATEST:-}" ]; then echo "No daily files found in site/data/daily"; exit 1; fi
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Cache-bust data urls
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          D="${LATEST:-unknown}"
          find site -type f -name "*.html" -print0 | xargs -0 --no-run-if-empty sed -i.bak -E "s#(data/[^\"']+\.(jsonl|json)(\.gz)?)#\1?v=${SHA}&d=${D}#g"
          find site -type f -name "*.js" -print0 | xargs -0 --no-run-if-empty sed -i.bak -E "s#(data/[^\"']+\.(jsonl|json)(\.gz)?)#\1?v=${SHA}&d=${D}#g"
          find site -name "*.bak" -delete

      - name: Create .nojekyll
        run: echo > site/.nojekyll

      - name: Upload site debug artifact
        uses: actions/upload-artifact@v6
        with:
          name: site-debug
          path: site

      - uses: actions/configure-pages@v6

      - id: upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v5

      # Fail the workflow if sentiment is stale, so GitHub mobile notifies
      # us regardless of laptop launchd state. Runs after deploy so the site
      # still ships with whatever data we have.
      - name: Sentiment freshness health check
        run: python scripts/health_check.py