name: trend-site

on:
  workflow_dispatch:
  schedule:
    - cron: "25 7 * * *"
  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "site/**"
      - "config/**"
      - "configs/**"
      - ".github/workflows/trend-site.yml"
  workflow_run:
    workflows: ["update-warehouse", "fetch-prices"]
    types: [completed]

permissions:
  actions: write
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          pip install yfinance pandas numpy orjson pyyaml feedparser || true

      # ── Warehouse 다운로드 ────────────────────────────────────────────────────
      - name: Get latest warehouse run id
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RID=$(gh run list --workflow update-warehouse.yml --branch main --status success --json databaseId -q '.[0].databaseId')
          echo "RUN_ID=$RID" >> $GITHUB_ENV

      - name: Download warehouse artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh run download "$RUN_ID" -n warehouse -D artifacts

      - name: Extract warehouse
        run: |
          set -euo pipefail
          mkdir -p data/warehouse
          if ls artifacts/*.zip >/dev/null 2>&1; then unzip -o artifacts/*.zip -d artifacts >/dev/null; fi
          if [ -f artifacts/artifact.tar ]; then tar -xf artifacts/artifact.tar -C artifacts; fi
          if [ -d artifacts/warehouse ]; then
            rsync -a artifacts/warehouse/ data/warehouse/
          elif [ -d artifacts/daily ]; then
            mkdir -p data/warehouse/daily
            rsync -a artifacts/daily/ data/warehouse/daily/
          elif [ -d artifacts/artifacts ]; then
            rsync -a artifacts/artifacts/ data/
          fi
          test -d data/warehouse/daily
          ls -lt data/warehouse/daily | head -n 8 || true

      # ── 토큰 처리 ─────────────────────────────────────────────────────────────
      - name: Convert csv/jsonl to *_tokens.jsonl
        run: |
          set -euo pipefail
          python scripts/csv_to_tokens.py
          DT=$(ls data/warehouse/daily/*_tokens.jsonl | sed -E 's#.*/([0-9]{4}-[0-9]{2}-[0-9]{2})_tokens\.jsonl#\1#' | sort | tail -n1 || true)
          [ -n "$DT" ] && echo "LATEST_TOKENS=$DT" >> $GITHUB_ENV || true

      - name: Mirror *_tokens.jsonl -> *_tokens.csv
        run: |
          set -euo pipefail
          python scripts/tokens_jsonl_to_csv.py

      - name: Aggregate from warehouse
        run: |
          python scripts/aggregate_from_warehouse.py \
            --warehouse data/warehouse/daily \
            --out run \
            --last-days 7 \
            --min-len 4 \
            --extra-stop config/extra_noise.txt

      # ── trends.json 빌드 ──────────────────────────────────────────────────────
      - name: Build trends.json
        run: |
          python scripts/make_trends_json.py \
            --tokens-dir data/warehouse/daily \
            --out        site/data/trends.json \
            --last-days  180 \
            --topk       300 \
            --min-len    4 || true
          python3 -c "
          import json
          d=json.load(open('site/data/trends.json'))
          print('trends: dates='+str(len(d['dates']))+' terms='+str(len(d['terms']))+' last='+d['dates'][-1])
          " || true

      # ── 정적 페이지 빌드 ──────────────────────────────────────────────────────
      - name: Build static pages
        run: |
          python scripts/build_static_ui.py --run run --out site
          test -s site/index.html
          test -s site/report.html
          test -s site/rising.html

      - name: Overwrite index with custom dashboard
        run: cp site/index_custom.html site/index.html

      # ── 가격 데이터 ───────────────────────────────────────────────────────────
      - name: Restore price CSVs from data-cache
        run: |
          mkdir -p data/prices
          git fetch origin data-cache 2>/dev/null || true
          if git show-ref --verify refs/remotes/origin/data-cache 2>/dev/null; then
            git checkout origin/data-cache -- data/prices/ 2>/dev/null || true
            echo "Restored: $(ls data/prices/*.csv 2>/dev/null | wc -l) CSV files"
          else
            echo "data-cache not found — will download fresh"
          fi

      - name: Fetch prices (incremental)
        run: |
          python scripts/fetch_prices_v2.py \
            --price-dir data/prices \
            --out-json  site/data/prices.json \
            --out-meta  site/data/prices_meta.json \
            --last-days 365 || true

      - name: Save price CSVs to data-cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # worktree 방식 — 브랜치 전환/stash 없이 data-cache에 직접 push
          mkdir -p /tmp/cache-worktree

          if git ls-remote --heads origin data-cache | grep -q data-cache; then
            git worktree add /tmp/cache-worktree data-cache 2>/dev/null ||             git worktree add /tmp/cache-worktree -b data-cache origin/data-cache
          else
            git worktree add --orphan /tmp/cache-worktree data-cache 2>/dev/null ||             git worktree add /tmp/cache-worktree -b data-cache
          fi

          mkdir -p /tmp/cache-worktree/data/prices
          cp -r data/prices/. /tmp/cache-worktree/data/prices/ 2>/dev/null || true

          cd /tmp/cache-worktree
          # .gitignore가 data/prices를 막으므로 worktree에서 제거 후 add
          rm -f .gitignore
          git add data/prices/
          if ! git diff --cached --quiet; then
            git commit -m "prices: $(date -u +%Y-%m-%d)"
            git push origin data-cache
            echo "Pushed price CSVs to data-cache"
          else
            echo "No price changes to push"
          fi

      # ── TA + 신호 분석 ────────────────────────────────────────────────────────
      - name: Run technical analysis
        run: |
          python scripts/analyze_prices.py \
            --prices      site/data/prices.json \
            --trends      site/data/trends.json \
            --out-json    site/data/technical_analysis.json \
            --out-summary site/data/ta_summary.json \
            --out-csv-dir run || true
          gzip -f -k site/data/technical_analysis.json || true

      - name: Build signal correlations
        run: |
          python scripts/build_signal_corr.py \
            --trends     site/data/trends.json \
            --prices     site/data/prices.json \
            --out        site/data/signal_corr.json \
            --top-terms  200 \
            --min-corr   0.25 \
            --min-events 3 || true

      - name: Generate predictions
        run: |
          python scripts/predict.py \
            --ta      site/data/technical_analysis.json \
            --signals site/data/signal_corr.json \
            --trends  site/data/trends.json \
            --out     site/data/predictions.json || true

      - name: Analyze ticker patterns
        run: |
          python scripts/analyze_ticker.py \
            --trends     site/data/trends.json \
            --prices     site/data/prices.json \
            --out-dir    site/data/ticker_analysis \
            --tickers    AAPL,MSFT,NVDA,GOOGL,META,AMZN,TSLA,AMD,INTC,AVGO,QCOM,ASML,MU,NXPI,JPM,BAC,GS,MS,BLK,XOM,CVX,SPY,QQQ,IWM,DIA,TLT,GLD,USO \
            --min-events 3 \
            --z-thresh   1.0 \
            --lag-range  2 || true

      # ── 기타 ──────────────────────────────────────────────────────────────────
      - name: Build tickers.json (sectors)
        run: |
          python scripts/make_ticker_sectors.py --map config/ticker_aliases.json --out site/data/tickers.json || true

      - name: Copy daily files into site
        run: |
          set -euo pipefail
          mkdir -p site/data/daily
          rsync -a data/warehouse/daily/*.jsonl site/data/daily/ 2>/dev/null || true
          rsync -a data/warehouse/daily/*_tokens.jsonl site/data/daily/ 2>/dev/null || true
          rsync -a data/warehouse/daily/*.jsonl.gz site/data/daily/ 2>/dev/null || true

      - name: Build aggregate entities_daily.jsonl
        run: |
          set -euo pipefail
          python scripts/build_entities_daily.py

      - name: Duplicate aggregate to legacy paths
        run: |
          set -euo pipefail
          cp -f site/data/entities_daily.jsonl site/entities_daily.jsonl || true
          cp -f site/data/entities_daily.jsonl site/data/entities.jsonl || true
          gzip -f -k site/data/entities_daily.jsonl
          gzip -f -k site/entities_daily.jsonl
          gzip -f -k site/data/entities.jsonl

      - name: Determine latest date and export
        run: |
          set -euo pipefail
          LATEST=$(ls site/data/daily/*.jsonl* 2>/dev/null | sed -E 's#.*/([0-9]{4}-[0-9]{2}-[0-9]{2}).*#\1#' | sort | tail -n1 || true)
          if [ -z "${LATEST:-}" ]; then echo "No daily files found in site/data/daily"; exit 1; fi
          echo "LATEST=$LATEST" >> $GITHUB_ENV

      - name: Cache-bust data urls
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          D="${LATEST:-unknown}"
          find site -type f -name "*.html" -print0 | xargs -0 --no-run-if-empty sed -i.bak -E "s#(data/[^\"']+\.(jsonl|json)(\.gz)?)#\1?v=${SHA}&d=${D}#g"
          find site -type f -name "*.js" -print0 | xargs -0 --no-run-if-empty sed -i.bak -E "s#(data/[^\"']+\.(jsonl|json)(\.gz)?)#\1?v=${SHA}&d=${D}#g"
          find site -name "*.bak" -delete

      - name: Create .nojekyll
        run: echo > site/.nojekyll

      - name: Upload site debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-debug
          path: site

      - uses: actions/configure-pages@v5

      - id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4