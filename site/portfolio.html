<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newstrend · My Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#070b10;--bg1:#0c1220;--bg2:#101828;--bg3:#0a1018;
  --b1:#1a2840;--b2:#223050;
  --cyan:#00d4ff;--amber:#ffb300;--green:#00e676;--red:#ff4444;--purple:#b380ff;
  --t1:#c8d8e8;--t2:#6a8aa8;--t3:#344a60;
  --fm:'IBM Plex Mono',monospace;--fs:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:var(--fs);font-size:13px;
     min-height:100dvh;padding-bottom:40px}
.unified-header{height:48px;display:flex;align-items:center;gap:24px;padding:0 24px;
  background:var(--bg1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:100}
.brand{font-family:var(--fm);font-size:14px;font-weight:600;color:var(--cyan);letter-spacing:.06em}
.brand em{color:var(--t3);font-style:normal;font-weight:300;margin-left:6px}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav a{font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.1em;
      text-transform:uppercase;color:var(--t2);text-decoration:none;padding:6px 12px;
      border:1px solid transparent;transition:all .12s}
nav a:hover,nav a.on{color:var(--cyan);border-color:var(--b2);background:var(--bg2)}
.hdr-right{margin-left:auto;display:flex;gap:14px;align-items:center}
.live{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;color:var(--green)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#unified-ts{font-family:var(--fm);font-size:10px;color:var(--t3)}

main{max-width:1300px;margin:20px auto;padding:0 24px}

/* SUMMARY STRIP */
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b1);
         border:1px solid var(--b1);margin-bottom:20px}
.sum-cell{background:var(--bg2);padding:14px;text-align:center}
.sum-label{font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
           color:var(--t3);margin-bottom:5px}
.sum-val{font-family:var(--fm);font-size:18px;font-weight:600;color:var(--t1)}
.sum-sub{font-family:var(--fm);font-size:10px;color:var(--t2);margin-top:3px}

/* ADD HOLDING form */
.add-section{background:var(--bg1);border:1px solid var(--b1);padding:16px 20px;
             margin-bottom:20px}
.add-form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:end}
.add-field label{font-family:var(--fm);font-size:9px;letter-spacing:.1em;
                 text-transform:uppercase;color:var(--t3);display:block;margin-bottom:4px}
.add-field input,.add-field select{
  width:100%;background:var(--bg2);border:1px solid var(--b2);color:var(--t1);
  padding:8px 10px;font-family:var(--fm);font-size:12px}
.add-field input:focus,.add-field select:focus{outline:none;border-color:var(--cyan)}
.btn-add{background:var(--cyan);color:var(--bg0);border:1px solid var(--cyan);
         font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.06em;
         padding:8px 18px;cursor:pointer;transition:all .12s}
.btn-add:hover{background:transparent;color:var(--cyan)}

/* HOLDINGS LIST */
.holdings{display:flex;flex-direction:column;gap:10px}
.hcard{background:var(--bg1);border:1px solid var(--b1);border-left:5px solid;
       padding:16px 20px;display:grid;grid-template-columns:auto 1fr auto auto auto;
       gap:18px;align-items:center;transition:all .15s;position:relative}
.hcard.action-BUY{border-left-color:var(--green)}
.hcard.action-WATCH{border-left-color:var(--cyan)}
.hcard.action-HOLD{border-left-color:var(--t3)}
.hcard.action-REDUCE{border-left-color:var(--amber)}
.hcard.action-SELL{border-left-color:var(--red)}
.hcard.alert{box-shadow:0 0 12px rgba(255,68,68,0.15)}

.h-tic{font-family:var(--fm);font-size:18px;font-weight:600;color:var(--t1);width:75px}
.h-prices{display:flex;gap:18px;flex-wrap:wrap}
.h-pblock{}
.h-plabel{font-family:var(--fm);font-size:8px;letter-spacing:.1em;text-transform:uppercase;
          color:var(--t3);margin-bottom:2px}
.h-pval{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--t1)}
.h-pl{font-family:var(--fm);font-size:14px;font-weight:600}
.h-pl.up{color:var(--green)}
.h-pl.down{color:var(--red)}

.h-action{font-family:var(--fm);font-size:11px;font-weight:600;padding:5px 14px;
          border:1px solid;text-align:center;letter-spacing:.06em}
.h-action.BUY{color:var(--green);border-color:var(--green);background:rgba(0,230,118,.08)}
.h-action.WATCH{color:var(--cyan);border-color:var(--cyan);background:rgba(0,212,255,.08)}
.h-action.HOLD{color:var(--t2);border-color:var(--b2)}
.h-action.REDUCE{color:var(--amber);border-color:var(--amber);background:rgba(255,179,0,.08)}
.h-action.SELL{color:var(--red);border-color:var(--red);background:rgba(255,68,68,.08)}

.h-recommend{font-family:var(--fm);font-size:10px;max-width:320px;color:var(--t1)}
.h-recommend .label{font-size:8px;color:var(--t3);letter-spacing:.1em;
                    text-transform:uppercase;margin-bottom:3px}
.h-recommend .text{line-height:1.5}
.h-recommend .text.alert{color:var(--red);font-weight:500}
.h-recommend .text.good{color:var(--green);font-weight:500}

.btn-x{background:none;border:1px solid var(--b2);color:var(--t3);font-family:var(--fm);
       font-size:11px;cursor:pointer;padding:5px 10px;transition:all .12s}
.btn-x:hover{color:var(--red);border-color:var(--red)}

.alert-banner{background:rgba(255,68,68,0.1);border:1px solid var(--red);padding:12px 16px;
              margin-bottom:16px;font-family:var(--fm);font-size:11px;color:var(--red);
              display:none;align-items:center;gap:10px}
.alert-banner.show{display:flex}

.empty{text-align:center;padding:50px;color:var(--t3);font-family:var(--fm);font-size:11px;
       background:var(--bg1);border:1px dashed var(--b2)}
.empty .e-icon{font-size:32px;margin-bottom:12px;opacity:0.4}

.section-title{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.14em;
               text-transform:uppercase;color:var(--t1);margin-bottom:12px;
               padding-bottom:6px;border-bottom:1px solid var(--b1)}

.tip{font-family:var(--fm);font-size:9px;color:var(--t3);margin-top:10px}

@media(max-width:900px){
  .add-form{grid-template-columns:1fr 1fr}
  .summary{grid-template-columns:repeat(2,1fr)}
  .hcard{grid-template-columns:1fr;gap:10px}
}
</style>
</head>
<body>
<header class="unified-header">
  <div class="brand">NEWSTREND <em>// MY HOLDINGS</em></div>
  <nav>
    <a href="./index.html">DASHBOARD</a>
    <a href="./signals.html">SIGNALS</a>
    <a href="./predict.html">PREDICT</a>
    <a href="./ticker_detail.html">TICKER</a>
    <a href="./report.html">REPORT</a>
    <a href="./weekly.html">WEEKLY</a>
    <a href="./portfolio.html" class="on">PORTFOLIO</a>
    <a href="./rising.html">RISING</a>
    <a href="./macro.html">MACRO</a>
    <a href="./backtest.html">BACKTEST</a>
  </nav>
  <div class="hdr-right">
    <div class="live"><div class="dot"></div>LIVE</div>
    <div id="unified-ts">—</div>
  </div>
</header>

<main>
  <!-- 알림 배너 -->
  <div class="alert-banner" id="alert-banner">
    <span style="font-size:14px">⚠</span>
    <span id="alert-text">—</span>
  </div>

  <!-- 포트폴리오 요약 -->
  <div class="summary" id="summary">
    <div class="sum-cell"><div class="sum-label">Holdings</div><div class="sum-val" id="s-count">0</div></div>
    <div class="sum-cell"><div class="sum-label">Cost Basis</div><div class="sum-val" id="s-cost">$0</div></div>
    <div class="sum-cell"><div class="sum-label">Current Value</div><div class="sum-val" id="s-value">$0</div></div>
    <div class="sum-cell"><div class="sum-label">Total P/L</div><div class="sum-val" id="s-pl">$0</div></div>
    <div class="sum-cell"><div class="sum-label">Active Alerts</div><div class="sum-val" id="s-alerts" style="color:var(--amber)">0</div></div>
  </div>

  <!-- 종목 추가 -->
  <div class="add-section">
    <div class="section-title">+ ADD HOLDING</div>
    <form class="add-form" id="add-form" onsubmit="addHolding(event)">
      <div class="add-field">
        <label>TICKER</label>
        <input type="text" id="i-ticker" required maxlength="5" placeholder="AAPL"
               style="text-transform:uppercase">
      </div>
      <div class="add-field">
        <label>SHARES</label>
        <input type="number" id="i-shares" required min="0.01" step="any" placeholder="10">
      </div>
      <div class="add-field">
        <label>BUY PRICE</label>
        <input type="number" id="i-price" required min="0.01" step="any" placeholder="250.00">
      </div>
      <div class="add-field">
        <label>STOP %</label>
        <input type="number" id="i-stop" min="1" max="50" step="0.5" value="7"
               placeholder="7" title="손절 % (예: 7 = -7%)">
      </div>
      <div class="add-field">
        <label>TARGET %</label>
        <input type="number" id="i-target" min="1" max="100" step="0.5" value="15"
               placeholder="15" title="목표 % (예: 15 = +15%)">
      </div>
      <button type="submit" class="btn-add">ADD</button>
    </form>
    <div class="tip">데이터는 브라우저에 로컬 저장됨. 종목 추가 후 자동으로 BUY/SELL 신호가 매칭됩니다.</div>
  </div>

  <!-- 보유 종목 리스트 -->
  <div class="section-title">📊 MY HOLDINGS</div>
  <div class="holdings" id="holdings">
    <div class="empty"><div class="e-icon">📂</div>아직 보유 종목이 없습니다<br>위에서 추가해 주세요</div>
  </div>
</main>

<script>
(function(){
'use strict';
const V = Date.now();
const STORAGE_KEY = 'newstrend_portfolio_v2';

let _data = {};

async function fetchJSON(p){
  try {
    const r = await fetch(`./data/${p}?v=${V}`, {cache:'no-store'});
    if(!r.ok) return null;
    return r.json();
  } catch(e) { return null; }
}

function loadHoldings(){
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch(e) { return []; }
}

function saveHoldings(h){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}

window.addHolding = function(e){
  e.preventDefault();
  const t = document.getElementById('i-ticker').value.toUpperCase().trim();
  const s = parseFloat(document.getElementById('i-shares').value);
  const p = parseFloat(document.getElementById('i-price').value);
  const stop = parseFloat(document.getElementById('i-stop').value || 7);
  const target = parseFloat(document.getElementById('i-target').value || 15);

  if (!t || !s || !p) return;

  const holdings = loadHoldings();
  // 중복 체크 - 같은 종목 평균가 처리
  const existing = holdings.find(h => h.ticker === t);
  if (existing) {
    const totalShares = existing.shares + s;
    const totalCost = existing.shares * existing.buyPrice + s * p;
    existing.buyPrice = totalCost / totalShares;
    existing.shares = totalShares;
    existing.stopPct = stop;
    existing.targetPct = target;
  } else {
    holdings.push({
      ticker: t, shares: s, buyPrice: p,
      stopPct: stop, targetPct: target,
      addedAt: new Date().toISOString(),
    });
  }
  saveHoldings(holdings);
  document.getElementById('add-form').reset();
  document.getElementById('i-stop').value = 7;
  document.getElementById('i-target').value = 15;
  render();
};

window.removeHolding = function(ticker){
  if (!confirm(`Remove ${ticker} from portfolio?`)) return;
  const h = loadHoldings().filter(x => x.ticker !== ticker);
  saveHoldings(h);
  render();
};

async function init(){
  const tsEl = document.getElementById('unified-ts');
  if (tsEl) tsEl.textContent = 'UPDATED ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  const [pred, prices, themes, backtest] = await Promise.all([
    fetchJSON('predictions.json'),
    fetchJSON('prices.json'),
    fetchJSON('macro_themes.json'),
    fetchJSON('backtest_v2.json'),
  ]);
  _data = { pred, prices, themes, backtest };
  render();
}

function getCurrentPrice(ticker){
  const t = _data.prices?.tickers?.[ticker];
  if (!t || !t.closes || !t.closes.length) return null;
  // 마지막 비-null 값
  for (let i = t.closes.length - 1; i >= 0; i--) {
    if (t.closes[i] != null) return t.closes[i];
  }
  return null;
}

function getPrediction(ticker){
  return (_data.pred?.predictions || []).find(p => p.ticker === ticker);
}

function generateRecommendation(holding, currentPrice, prediction){
  const buyPrice = holding.buyPrice;
  const pct = ((currentPrice - buyPrice) / buyPrice) * 100;
  const stopHit = pct <= -holding.stopPct;
  const targetHit = pct >= holding.targetPct;
  const action = prediction?.action || 'HOLD';

  // 백테스트 데이터에서 종목 등급 확인
  const btTicker = _data.backtest?.by_ticker?.[holding.ticker];
  let tierBadge = '';
  if (btTicker) {
    const wr = btTicker.win_rate;
    const tr = btTicker.total_ret;
    if (tr < 0) tierBadge = ' [⚠ X-Tier: 백테스트 손실]';
    else if (wr >= 75) tierBadge = ' [✓ A-Tier]';
    else if (wr >= 60) tierBadge = ' [B-Tier]';
    else tierBadge = ' [C-Tier]';
  }

  // 우선순위: 손절 > 목표 도달 > 신호
  if (stopHit) {
    return {
      level: 'alert',
      action: 'SELL',
      text: `🛑 손절가 도달 (${pct.toFixed(1)}%) — 즉시 매도 검토. 추가 손실 방지가 우선.${tierBadge}`,
    };
  }
  if (targetHit) {
    return {
      level: 'good',
      action: 'REDUCE',
      text: `🎯 목표가 도달 (+${pct.toFixed(1)}%) — 일부 익절 권장.${tierBadge}`,
    };
  }

  // 신호 기반
  if (action === 'SELL' || action === 'REDUCE') {
    if (pct > 0) {
      return {
        level: 'alert',
        action: action,
        text: `⚠ 시스템 ${action} 신호 (현재 +${pct.toFixed(1)}%) — 일부 매도해 수익 실현 검토.`,
      };
    } else {
      return {
        level: 'alert',
        action: 'SELL',
        text: `⚠ 시스템 ${action} 신호 + 손실 중 (${pct.toFixed(1)}%) — 손절 검토.`,
      };
    }
  }
  if (action === 'BUY') {
    return {
      level: 'good',
      action: 'BUY',
      text: `📈 시스템 BUY 신호. 분할매수 또는 보유 유지.${tierBadge}`,
    };
  }
  if (action === 'WATCH') {
    return {
      level: 'neutral',
      action: 'WATCH',
      text: `👁 시스템 WATCH 신호. 가격 움직임 주시. 손절 $${(buyPrice * (1 - holding.stopPct/100)).toFixed(2)}.`,
    };
  }
  return {
    level: 'neutral',
    action: 'HOLD',
    text: `보유 유지.${tierBadge}`,
  };
}

function render(){
  const holdings = loadHoldings();
  const list = document.getElementById('holdings');

  if (!holdings.length) {
    list.innerHTML = '<div class="empty"><div class="e-icon">📂</div>아직 보유 종목이 없습니다<br>위에서 추가해 주세요</div>';
    document.getElementById('s-count').textContent = '0';
    document.getElementById('s-cost').textContent = '$0';
    document.getElementById('s-value').textContent = '$0';
    document.getElementById('s-pl').textContent = '$0';
    document.getElementById('s-alerts').textContent = '0';
    document.getElementById('alert-banner').classList.remove('show');
    return;
  }

  let totalCost = 0, totalValue = 0, alertCount = 0;
  const alerts = [];

  const html = holdings.map(h => {
    const cur = getCurrentPrice(h.ticker);
    const pred = getPrediction(h.ticker);
    const cost = h.shares * h.buyPrice;
    totalCost += cost;

    if (cur === null) {
      return `<div class="hcard action-HOLD">
        <div class="h-tic">${h.ticker}</div>
        <div class="h-recommend">
          <div class="label">상태</div>
          <div class="text">가격 데이터 없음 (지원되지 않는 종목)</div>
        </div>
        <div></div><div></div>
        <button class="btn-x" onclick="removeHolding('${h.ticker}')">✕</button>
      </div>`;
    }

    const value = h.shares * cur;
    totalValue += value;
    const pl = value - cost;
    const plPct = (pl / cost) * 100;
    const action = pred?.action || 'HOLD';
    const rec = generateRecommendation(h, cur, pred);

    if (rec.level === 'alert') {
      alertCount++;
      alerts.push(`${h.ticker}: ${rec.action}`);
    }

    return `<div class="hcard action-${rec.action} ${rec.level === 'alert' ? 'alert' : ''}">
      <div class="h-tic">${h.ticker}</div>
      <div class="h-prices">
        <div class="h-pblock">
          <div class="h-plabel">BUY</div>
          <div class="h-pval">$${h.buyPrice.toFixed(2)}</div>
        </div>
        <div class="h-pblock">
          <div class="h-plabel">CURRENT</div>
          <div class="h-pval">$${cur.toFixed(2)}</div>
        </div>
        <div class="h-pblock">
          <div class="h-plabel">SHARES</div>
          <div class="h-pval">${h.shares}</div>
        </div>
        <div class="h-pblock">
          <div class="h-plabel">P/L</div>
          <div class="h-pl ${pl >= 0 ? 'up' : 'down'}">${pl >= 0 ? '+' : ''}$${pl.toFixed(0)} (${plPct >= 0 ? '+' : ''}${plPct.toFixed(1)}%)</div>
        </div>
        <div class="h-pblock">
          <div class="h-plabel">STOP / TGT</div>
          <div class="h-pval" style="font-size:11px;color:var(--t2)">
            $${(h.buyPrice * (1 - h.stopPct/100)).toFixed(2)} / $${(h.buyPrice * (1 + h.targetPct/100)).toFixed(2)}
          </div>
        </div>
      </div>
      <div class="h-action ${rec.action}">${rec.action}</div>
      <div class="h-recommend">
        <div class="label">RECOMMENDATION</div>
        <div class="text ${rec.level}">${rec.text}</div>
      </div>
      <button class="btn-x" onclick="removeHolding('${h.ticker}')">✕</button>
    </div>`;
  }).join('');

  list.innerHTML = html;

  // 요약
  const totalPL = totalValue - totalCost;
  const totalPLPct = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;

  document.getElementById('s-count').textContent = holdings.length;
  document.getElementById('s-cost').textContent = '$' + totalCost.toFixed(0);
  document.getElementById('s-value').textContent = '$' + totalValue.toFixed(0);
  const plEl = document.getElementById('s-pl');
  plEl.textContent = (totalPL >= 0 ? '+' : '') + '$' + totalPL.toFixed(0);
  plEl.style.color = totalPL >= 0 ? 'var(--green)' : 'var(--red)';
  const sub = totalPLPct >= 0 ? '+' + totalPLPct.toFixed(1) + '%' : totalPLPct.toFixed(1) + '%';
  plEl.innerHTML = plEl.textContent + ` <span style="font-size:11px;color:var(--t3)">${sub}</span>`;

  document.getElementById('s-alerts').textContent = alertCount;

  if (alertCount > 0) {
    document.getElementById('alert-banner').classList.add('show');
    document.getElementById('alert-text').textContent =
      `${alertCount}개 종목에 즉시 검토 필요한 신호 — ${alerts.join(', ')}`;
  } else {
    document.getElementById('alert-banner').classList.remove('show');
  }
}

init();
})();
</script>
</body>
</html>
