<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newstrend · Signal Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" crossorigin="anonymous"></script>
<style>
/* ── tokens ── */
:root {
  --bg0:#070b10; --bg1:#0c1220; --bg2:#101828; --bg3:#162035;
  --b1:#1a2840; --b2:#223050;
  --cyan:#00d4ff; --amber:#ffb300; --green:#00e676; --red:#ff4444;
  --purple:#b39ddb; --blue:#4d9fff;
  --t1:#c8d8e8; --t2:#6a8aa8; --t3:#344a60;
  --font-mono:'IBM Plex Mono',monospace;
  --font-sans:'IBM Plex Sans',sans-serif;
}

/* ── reset ── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:var(--font-sans);font-size:13px;
     height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── scrollbars ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ━━━━━━━━━━━━━━━ HEADER ━━━━━━━━━━━━━━━ */
header{
  height:42px;display:flex;align-items:center;gap:20px;
  padding:0 16px;background:var(--bg1);border-bottom:1px solid var(--b1);
  flex-shrink:0;
}
.brand{font-family:var(--font-mono);font-size:13px;font-weight:600;
       color:var(--cyan);letter-spacing:.06em;white-space:nowrap}
.brand em{color:var(--t3);font-style:normal;font-weight:300}

nav{display:flex;gap:2px}
nav a{font-family:var(--font-mono);font-size:10px;font-weight:500;
      letter-spacing:.1em;text-transform:uppercase;color:var(--t2);
      text-decoration:none;padding:5px 11px;border:1px solid transparent;
      transition:all .12s}
nav a:hover,nav a.on{color:var(--cyan);border-color:var(--b2);background:var(--bg2)}

.hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.live{display:flex;align-items:center;gap:5px;
      font-family:var(--font-mono);font-size:10px;color:var(--green);letter-spacing:.1em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
     animation:blink 2.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#ts{font-family:var(--font-mono);font-size:10px;color:var(--t3)}

/* ━━━━━━━━━━━━━━━ LAYOUT ━━━━━━━━━━━━━━━ */
main{flex:1;display:grid;grid-template-columns:288px 1fr 300px;
     gap:1px;background:var(--b1);overflow:hidden;min-height:0}
.col{background:var(--bg0);display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* ━━━━━━━━━━━━━━━ SHARED PANEL PARTS ━━━━━━━━━━━━━━━ */
.phdr{height:36px;display:flex;align-items:center;justify-content:space-between;
      padding:0 12px;background:var(--bg1);border-bottom:1px solid var(--b1);flex-shrink:0}
.plabel{font-family:var(--font-mono);font-size:10px;font-weight:600;
        letter-spacing:.12em;text-transform:uppercase;color:var(--t2)}
.pbadge{font-family:var(--font-mono);font-size:10px;color:var(--amber);
        background:rgba(255,179,0,.1);padding:2px 7px;
        border:1px solid rgba(255,179,0,.25);white-space:nowrap}

/* ━━━━━━━━━━━━━━━ LEFT – SIGNAL LIST ━━━━━━━━━━━━━━━ */
.filter-row{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--b1);flex-shrink:0}
.fbtn{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;font-weight:500;
      padding:4px 9px;border:1px solid var(--b2);background:transparent;
      color:var(--t2);cursor:pointer;transition:all .12s;text-transform:uppercase}
.fbtn:hover,.fbtn.on{background:var(--bg2);color:var(--cyan);border-color:var(--cyan)}

.sbox{padding:7px 10px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sbox input{width:100%;background:var(--bg2);border:1px solid var(--b2);
            color:var(--t1);font-family:var(--font-mono);font-size:11px;
            padding:5px 9px;outline:none;transition:border .12s}
.sbox input::placeholder{color:var(--t3)}
.sbox input:focus{border-color:var(--cyan)}

#sig-list{flex:1;overflow-y:auto;padding:4px 0}

.sig{padding:7px 12px;cursor:pointer;border-left:2px solid transparent;
     display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;
     transition:all .1s}
.sig:hover{background:rgba(255,255,255,.025)}
.sig.sel{background:rgba(0,212,255,.05);border-left-color:var(--cyan)}

.sig-term{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--t1);
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sig-sub{font-family:var(--font-mono);font-size:9px;color:var(--t3);margin-top:2px}
.sig-right{text-align:right;flex-shrink:0}
.zbadge{font-family:var(--font-mono);font-size:11px;font-weight:600;
        padding:2px 6px;border:1px solid}
.zh{color:var(--red);border-color:rgba(255,68,68,.4);background:rgba(255,68,68,.08)}
.zm{color:var(--amber);border-color:rgba(255,179,0,.4);background:rgba(255,179,0,.08)}
.zl{color:var(--green);border-color:rgba(0,230,118,.4);background:rgba(0,230,118,.08)}
.zn{color:var(--t3);border-color:var(--b2);background:transparent}

/* ━━━━━━━━━━━━━━━ CENTER ━━━━━━━━━━━━━━━ */
/* Ticker heat strip */
#ticker-strip{height:34px;display:flex;align-items:center;gap:1px;
              padding:0 14px;border-bottom:1px solid var(--b1);
              overflow-x:auto;flex-shrink:0;background:var(--bg1)}
.tpill{font-family:var(--font-mono);font-size:10px;font-weight:600;
       padding:2px 9px;white-space:nowrap;cursor:pointer;
       letter-spacing:.04em;border:1px solid transparent;transition:all .12s}
.h0{color:var(--t3)}
.h1{color:#3a6a8e;background:rgba(58,106,142,.1);border-color:rgba(58,106,142,.2)}
.h2{color:#4a90c4;background:rgba(74,144,196,.12);border-color:rgba(74,144,196,.25)}
.h3{color:var(--cyan);background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.28)}
.h4{color:var(--amber);background:rgba(255,179,0,.12);border-color:rgba(255,179,0,.3)}
.h5{color:var(--red);background:rgba(255,68,68,.12);border-color:rgba(255,68,68,.3)}

/* Chart */
#chart-area{flex:1;display:flex;flex-direction:column;padding:12px 16px 8px;min-height:0}
.chdr{display:flex;align-items:center;justify-content:space-between;
      margin-bottom:10px;flex-shrink:0}
.ctitle{font-family:var(--font-mono);font-size:11px;color:var(--t2);
        letter-spacing:.09em;text-transform:uppercase}
.cmode{display:flex;gap:2px}
.cbtn{font-family:var(--font-mono);font-size:9px;padding:3px 9px;
      border:1px solid var(--b2);background:transparent;color:var(--t3);
      cursor:pointer;transition:all .12s;text-transform:uppercase}
.cbtn:hover,.cbtn.on{background:var(--bg2);color:var(--cyan);border-color:var(--cyan)}

.cwrap{flex:1;position:relative;min-height:0}
.cwrap canvas{position:absolute;inset:0}

/* Stats bar */
#stats{display:flex;gap:1px;border-top:1px solid var(--b1);flex-shrink:0}
.scell{flex:1;padding:6px 10px;background:var(--bg1);text-align:center}
.slabel{font-family:var(--font-mono);font-size:8px;color:var(--t3);
        letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.sval{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--cyan)}
.sval.up{color:var(--green)}
.sval.dn{color:var(--red)}

/* ━━━━━━━━━━━━━━━ RIGHT – TICKER RANKS + ARTICLES ━━━━━━━━━━━━━━━ */
#ticker-ranks{flex-shrink:0;border-bottom:1px solid var(--b1)}
.tr-row{display:flex;align-items:center;padding:5px 12px;gap:8px;
        border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;
        transition:background .1s}
.tr-row:hover{background:rgba(255,255,255,.025)}
.tr-rank{font-family:var(--font-mono);font-size:9px;color:var(--t3);width:14px;flex-shrink:0}
.tr-ticker{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--t1);flex:1}
.tr-bar-wrap{flex:2;height:4px;background:var(--b1);position:relative}
.tr-bar{height:100%;background:var(--cyan);transition:width .4s ease}
.tr-count{font-family:var(--font-mono);font-size:10px;color:var(--t2);flex-shrink:0;width:36px;text-align:right}
.tr-z{font-family:var(--font-mono);font-size:9px;padding:1px 4px;border:1px solid;flex-shrink:0}

#sel-indicator{display:none;align-items:center;gap:8px;padding:5px 12px;
               border-bottom:1px solid var(--b1);background:rgba(0,212,255,.04)}
#sel-label{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--cyan)}
.clr{margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--t3);
     background:none;border:1px solid var(--b2);padding:2px 7px;cursor:pointer;transition:all .12s}
.clr:hover{color:var(--red);border-color:var(--red)}

#art-feed{flex:1;overflow-y:auto;padding:0}
.acard{display:block;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);
       cursor:pointer;text-decoration:none;transition:background .1s}
.acard:hover{background:rgba(255,255,255,.025)}
.acard-top{display:flex;justify-content:space-between;margin-bottom:3px}
.asrc{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.09em;
      text-transform:uppercase;color:var(--t3)}
.atime{font-family:var(--font-mono);font-size:9px;color:var(--t3)}
.atitle{font-size:12px;font-weight:400;color:var(--t1);line-height:1.4}

/* Empty / loading states */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
       flex:1;gap:10px;color:var(--t3)}
.empty-ico{font-size:28px;opacity:.3}
.empty-txt{font-family:var(--font-mono);font-size:10px;text-align:center;
           line-height:1.7;letter-spacing:.05em}
.spin-wrap{display:flex;align-items:center;gap:10px;padding:20px;
           justify-content:center;color:var(--t2)}
.spinner{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--cyan);
         border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* section label */
.sec-lbl{padding:5px 12px;font-family:var(--font-mono);font-size:8px;font-weight:600;
         letter-spacing:.14em;text-transform:uppercase;color:var(--t3);
         border-bottom:1px solid var(--b1);background:var(--bg0);flex-shrink:0}
</style>

<body>

<!-- HEADER -->
<header>
  <div class="brand">NEWSTREND <em>// SIGNAL INTELLIGENCE</em></div>
  <nav>
    <a href="./index.html" class="on">TRENDS</a>
    <a href="./report.html">REPORT</a>

  </nav>
  <div class="hdr-right">

<main>
  <!-- ── LEFT: Signal List ── -->
  <div class="col">
    <div class="phdr">

      <div class="pbadge" id="sig-badge">LOADING…</div>
    </div>
    <div class="filter-row">
      <button class="fbtn on" data-f="all">ALL</button>
      <button class="fbtn" data-f="hot">HOT ≥3σ</button>

    </div>

      <input type="text" id="search" placeholder="search signals…" autocomplete="off">
    </div>
    <div id="sig-list">

        <span style="font-family:var(--font-mono);font-size:10px">LOADING SIGNALS</span>
      </div>

  </div>

  <!-- ── CENTER: Chart + Stats ── -->
  <div class="col">
    <!-- Ticker heat strip (today's mention counts) -->
    <div id="ticker-strip">
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--t3)">LOADING TICKERS…</span>
    </div>
    <div id="chart-area">
      <div class="chdr">
        <div class="ctitle" id="ctitle">SELECT A SIGNAL TO ANALYZE</div>
        <div class="cmode">
          <button class="cbtn on" data-m="count">RAW</button>
          <button class="cbtn" data-m="zscore">Z-SCORE</button>
          <button class="cbtn" data-m="slope">MOMENTUM</button>
        </div>
      </div>
      <div class="cwrap"><canvas id="mc"></canvas></div>
    </div>
    <div id="stats">
      <div class="scell"><div class="slabel">TODAY</div><div class="sval" id="s-today">—</div></div>
      <div class="scell"><div class="slabel">7D AVG</div><div class="sval" id="s-avg">—</div></div>
      <div class="scell"><div class="slabel">Z-SCORE</div><div class="sval" id="s-z">—</div></div>
      <div class="scell"><div class="slabel">MOMENTUM</div><div class="sval" id="s-slope">—</div></div>
      <div class="scell"><div class="slabel">TOTAL ARTS</div><div class="sval" id="s-total">—</div></div>
    </div>
  </div>

  <!-- ── RIGHT: Ticker Ranks + Articles ── -->
  <div class="col">
    <div class="phdr">
      <div class="plabel">TICKER RANK · TODAY</div>
      <div class="pbadge" id="art-badge">—</div>
    </div>
    <div id="ticker-ranks"><!-- populated by JS --></div>
    <div class="sec-lbl" id="art-section-label">ARTICLES</div>
    <div id="sel-indicator">
      <span id="sel-label"></span>
      <button class="clr" id="clr-btn">✕ CLEAR</button>
    </div>
    <div id="art-feed">
      <div class="empty">
        <div class="empty-ico">◈</div>
        <div class="empty-txt">SELECT A SIGNAL<br>TO VIEW ARTICLES</div>
      </div>
    </div>
  </div>
</main>

<script>
(function(){
'use strict';

// ── Config ────────────────────────────────────────────────────────────
const V = Date.now();
const BASE = './data/';

// Known ticker → common text aliases for article matching
const TICKER_ALIASES = {
  AAPL:['apple','aapl','apple inc'],
  MSFT:['microsoft','msft'],
  NVDA:['nvidia','nvda'],
  GOOGL:['google','alphabet','googl','goog'],
  META:['meta','facebook','instagram'],
  AMZN:['amazon','amzn'],
  TSLA:['tesla','tsla','elon musk'],
  AMD:['amd','advanced micro'],
  INTC:['intel','intc'],
  ORCL:['oracle','orcl'],
  AVGO:['broadcom','avgo'],
  QCOM:['qualcomm','qcom'],
  JPM:['jpmorgan','jp morgan','jpm'],
  BAC:['bank of america','bofa','bac'],
  GS:['goldman sachs','goldman'],
  MS:['morgan stanley'],
  WFC:['wells fargo','wfc'],
  BLK:['blackrock','blk'],
  V:['visa'],
  MA:['mastercard'],
  XOM:['exxon','xom'],
  CVX:['chevron','cvx'],
  JNJ:['johnson','jnj'],
  UNH:['unitedhealth','unh'],
  PFE:['pfizer','pfe'],
  ABBV:['abbvie','abbv'],
  LLY:['eli lilly','lilly'],
  WMT:['walmart','wmt'],
  HD:['home depot'],
  NKE:['nike','nke'],
  SBUX:['starbucks','sbux'],
  MCD:["mcdonald","mcd"],
  CAT:['caterpillar','cat'],
  BA:['boeing'],
  GE:['general electric'],
  FDX:['fedex','fdx'],
};

// ── State ─────────────────────────────────────────────────────────────
let T = null;          // trends.json
let articles = [];     // articles.json array or []
let pricesData = null; // prices.json (optional)
let signals = [];      // processed signal list
let selTerm = null;
let chartMode = 'count';
let mainChart = null;
let curFilter = 'all';

// ── Utils ─────────────────────────────────────────────────────────────
function fmt(n){ return n >= 1000 ? (n/1000).toFixed(1)+'K' : n; }
function sign(n){ return n > 0 ? '+' : ''; }

function timeSince(s){
  if(!s) return '';
  const d = new Date(s), now = Date.now();
  const h = Math.floor((now - d) / 3600000);
  if(h < 1) return 'just now';
  if(h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function zClass(z){
  if(Math.abs(z) >= 3) return 'zh';
  if(Math.abs(z) >= 1.5) return 'zm';
  if(Math.abs(z) >= 0.5) return 'zl';
  return 'zn';
}

// Compute z-score client-side if not in trends.json (fallback)
function computeZ(counts, window=28){
  if(counts.length < 3) return 0;
  const hist = counts.slice(Math.max(0, counts.length-window-1), counts.length-1);
  if(!hist.length) return 0;
  const mean = hist.reduce((a,b)=>a+b,0)/hist.length;
  const std = Math.sqrt(hist.reduce((a,b)=>a+(b-mean)**2,0)/hist.length);
  if(std < 0.5) return 0;
  return (counts[counts.length-1]-mean)/std;
}

function computeSlope(counts, window=14){
  const w = counts.slice(-window);
  const n = w.length;
  if(n < 3) return 0;
  const xs = Array.from({length:n},(_,i)=>i);
  const mx = xs.reduce((a,b)=>a+b)/n, my = w.reduce((a,b)=>a+b)/n;
  const num = xs.reduce((s,x,i)=>s+(x-mx)*(w[i]-my),0);
  const den = xs.reduce((s,x)=>s+(x-mx)**2,0);
  if(!den) return 0;
  return (num/den)/(my+1e-9);
}

// ── Fetch ─────────────────────────────────────────────────────────────
async function fetchJSON(path){
  try{
    const r = await fetch(BASE+path+'?v='+V,{cache:'no-store'});
    if(!r.ok) return null;
    return r.json();
  }catch(e){ console.warn('fetch',path,e); return null; }
}

// ── Init ──────────────────────────────────────────────────────────────
async function init(){
  document.getElementById('ts').textContent =
    'UPDATED '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  const [t, art, pr] = await Promise.all([
    fetchJSON('trends.json'),
    fetchJSON('articles.json'),
    fetchJSON('prices.json'),
  ]);

  T = t;
  pricesData = pr;

  if(Array.isArray(art)) articles = art;
  else if(art && Array.isArray(art.articles)) articles = art.articles;

  if(!T){ showErr('trends.json not found'); return; }

  buildSignals();
  renderSignalList();
  renderTickerStrip();
  renderTickerRanks();
  updateTotalStat();
  if(signals.length) selectSignal(signals[0]);
}

function showErr(msg){
  document.getElementById('sig-list').innerHTML =
    `<div class="spin-wrap" style="color:var(--red)">⚠ ${msg}</div>`;
}

// ── Build signal list from trends.json ───────────────────────────────
function buildSignals(){
  const { series={}, dates=[], zscores={}, slopes={}, bursts={}, today:td={}, avg7:a7={} } = T;

  signals = Object.keys(series).map(term => {
    const counts = (series[term]||[]).map(Number);
    const z = zscores[term] !== undefined ? zscores[term] : computeZ(counts);
    const slope = slopes[term] !== undefined ? slopes[term] : computeSlope(counts);
    const burst = bursts[term] !== undefined ? bursts[term] : computeZ(counts,7);
    const todayC = td[term] !== undefined ? td[term] : (counts[counts.length-1]||0);
    const avg = a7[term] !== undefined ? a7[term] :
      (counts.slice(-7).reduce((a,b)=>a+b,0)/Math.min(7,counts.length));
    const total = counts.reduce((a,b)=>a+b,0);
    return { term, counts, dates, z, slope, burst, todayC, avg, total };
  }).filter(s => s.total > 0);

  // Default sort: Z-score desc
  signals.sort((a,b) => b.z - a.z);
}

// ── Signal list render ─────────────────────────────────────────────────
function renderSignalList(){
  const list = document.getElementById('sig-list');
  const q = document.getElementById('search').value.toLowerCase().trim();
  let visible = signals;

  if(curFilter === 'hot') visible = signals.filter(s => s.z >= 3);
  else if(curFilter === 'rising') visible = signals.filter(s => s.slope > 0.08);
  else if(curFilter === 'burst') visible = signals.filter(s => s.burst >= 2);

  if(q) visible = visible.filter(s => s.term.toLowerCase().includes(q));

  document.getElementById('sig-badge').textContent = visible.length+' SIGNALS';

  if(!visible.length){
    list.innerHTML = `<div class="empty"><div class="empty-txt">NO SIGNALS MATCH FILTER</div></div>`;
    return;
  }

  const arrow = s => s.slope > 0.06 ? '↑' : s.slope < -0.06 ? '↓' : '→';
  const isSel = s => selTerm && selTerm.term === s.term;

  list.innerHTML = visible.slice(0,200).map(s => `
    <div class="sig${isSel(s)?' sel':''}" data-term="${s.term}">
      <div>
        <div class="sig-term">${arrow(s)} ${s.term}</div>
        <div class="sig-sub">${s.todayC} today · ${fmt(s.total)} total</div>
      </div>
      <div class="sig-right">
        <div class="zbadge ${zClass(s.z)}">${sign(s.z)}${s.z.toFixed(1)}σ</div>
      </div>
    </div>`).join('');

  list.querySelectorAll('.sig').forEach(el =>
    el.addEventListener('click', () => {
      const s = signals.find(x => x.term === el.dataset.term);
      if(s) selectSignal(s);
    })
  );
}

// ── Select a signal ────────────────────────────────────────────────────
function selectSignal(s){
  selTerm = s;

  // Highlight in list
  document.querySelectorAll('.sig').forEach(el =>
    el.classList.toggle('sel', el.dataset.term === s.term));

  // Indicator
  const ind = document.getElementById('sel-indicator');
  ind.style.display = 'flex';
  document.getElementById('sel-label').textContent = '▶ '+s.term.toUpperCase();

  // Update stats
  setStatVal('s-today', fmt(s.todayC), '');
  setStatVal('s-avg', s.avg.toFixed(1), '');
  const zEl = document.getElementById('s-z');
  zEl.textContent = sign(s.z)+s.z.toFixed(2);
  zEl.className = 'sval'+(s.z>=2?' up':s.z<=-1?' dn':'');
  const slEl = document.getElementById('s-slope');
  slEl.textContent = sign(s.slope)+s.slope.toFixed(3);
  slEl.className = 'sval'+(s.slope>0.05?' up':s.slope<-0.05?' dn':'');

  // Chart title
  document.getElementById('ctitle').textContent =
    `"${s.term.toUpperCase()}" — ${s.dates.length} DAYS TRACKED`;

  renderChart(s);
  renderArticles(s.term);
}

function setStatVal(id, val, cls){
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'sval'+(cls?' '+cls:'');
}

function updateTotalStat(){
  const tot = articles.length || (T&&T.series ?
    Object.values(T.series).reduce((s,a)=>s+(Array.isArray(a)?a.reduce((x,y)=>x+y,0):0),0) : 0);
  document.getElementById('s-total').textContent = fmt(tot);
}

// ── Chart ──────────────────────────────────────────────────────────────
function renderChart(s){
  const ctx = document.getElementById('mc');
  if(mainChart){ mainChart.destroy(); mainChart = null; }

  let dates = s.dates, data = s.counts;
  let label = 'Count', color = '#00d4ff';

  if(chartMode === 'zscore'){
    data = s.counts.map((_,i) => {
      if(i < 3) return 0;
      return parseFloat(computeZ(s.counts.slice(0,i+1)).toFixed(2));
    });
    label = 'Z-Score'; color = '#ffb300';
  } else if(chartMode === 'slope'){
    data = s.counts.map((_,i) => {
      if(i < 6) return 0;
      return parseFloat(computeSlope(s.counts.slice(0,i+1)).toFixed(4));
    });
    label = 'Momentum'; color = '#00e676';
  }

  // Last 60 days
  if(dates.length > 60){ dates = dates.slice(-60); data = data.slice(-60); }

  const grd = ctx.getContext('2d').createLinearGradient(0,0,0,280);
  grd.addColorStop(0, color+'44');
  grd.addColorStop(1, color+'00');

  mainChart = new Chart(ctx, {
    type:'line',
    data:{
      labels: dates,
      datasets:[{
        label, data,
        borderColor: color,
        backgroundColor: grd,
        borderWidth: 1.5,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: color,
        tension: 0.2,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#0c1220',
          borderColor:'#1a2840',
          borderWidth:1,
          titleColor:'#6a8aa8',
          bodyColor:'#c8d8e8',
          titleFont:{ family:'IBM Plex Mono', size:10 },
          bodyFont:{ family:'IBM Plex Mono', size:12 },
          callbacks:{
            title: i => i[0].label,
            label: i => ` ${label}: ${
              chartMode==='count'
                ? Number(i.raw).toLocaleString()
                : Number(i.raw).toFixed(2)
            }`
          }
        }
      },
      scales:{
        x:{
          grid:{ color:'#1a2840', drawBorder:false },
          ticks:{ color:'#344a60', font:{family:'IBM Plex Mono',size:9},
                  maxTicksLimit:8, maxRotation:0 }
        },
        y:{
          grid:{ color:'#1a2840', drawBorder:false },
          ticks:{ color:'#344a60', font:{family:'IBM Plex Mono',size:9} },
          ...(chartMode!=='count'?{
            afterDataLimits(scale){
              const abs=Math.max(Math.abs(scale.min),Math.abs(scale.max),0.1);
              scale.min=-abs; scale.max=abs;
            }
          }:{})
        }
      }
    }
  });
}

// ── Ticker strip (today's counts from series) ──────────────────────────
function renderTickerStrip(){
  if(!T || !T.series) return;
  const strip = document.getElementById('ticker-strip');
  const entries = [];

  for(const [ticker, aliases] of Object.entries(TICKER_ALIASES)){
    // Check if any alias or the ticker itself is in series
    let count = 0;
    const candidates = [ticker.toLowerCase(), ...aliases];
    for(const c of candidates){
      const ser = T.series[c] || T.series[c.toUpperCase()];
      if(ser && ser.length){
        count = Math.max(count, Number(ser[ser.length-1])||0);
      }
    }
    if(count > 0) entries.push({ ticker, count });
  }

  if(!entries.length){
    strip.innerHTML = '<span style="font-family:var(--font-mono);font-size:10px;color:var(--t3)">NO TICKER DATA IN SERIES</span>';
    return;
  }

  entries.sort((a,b) => b.count - a.count);
  const maxC = entries[0].count;

  strip.innerHTML = entries.slice(0,25).map(({ ticker, count }) => {
    const pct = count / maxC;
    const h = pct > .8 ? 5 : pct > .6 ? 4 : pct > .4 ? 3 : pct > .2 ? 2 : 1;
    return `<div class="tpill h${h}" data-ticker="${ticker}" title="${ticker}: ${count} today">
      ${ticker} <span style="opacity:.55">${count}</span></div>`;
  }).join('');

  strip.querySelectorAll('.tpill').forEach(el =>
    el.addEventListener('click', () => {
      const t = el.dataset.ticker.toLowerCase();
      const s = signals.find(x => x.term.toLowerCase() === t);
      if(s){ selectSignal(s); }
    })
  );
}

// ── Ticker rank panel (right) ──────────────────────────────────────────
function renderTickerRanks(){
  if(!T || !T.series){ return; }
  const panel = document.getElementById('ticker-ranks');
  const entries = [];

  for(const [ticker, aliases] of Object.entries(TICKER_ALIASES)){
    let count = 0, z = 0;
    const candidates = [ticker.toLowerCase(), ...aliases];
    for(const c of candidates){
      const key = T.series[c] ? c : T.series[c.toUpperCase()] ? c.toUpperCase() : null;
      if(!key) continue;
      const ser = T.series[key].map(Number);
      const todayC = ser[ser.length-1]||0;
      if(todayC > count){
        count = todayC;
        const zv = T.zscores && T.zscores[key] !== undefined
          ? T.zscores[key] : computeZ(ser);
        z = zv;
      }
    }
    if(count > 0) entries.push({ ticker, count, z });
  }

  if(!entries.length){
    panel.innerHTML = '<div style="padding:12px;font-family:var(--font-mono);font-size:10px;color:var(--t3)">NO TICKER SERIES DATA</div>';
    return;
  }

  entries.sort((a,b) => b.count - a.count);
  const maxC = entries[0].count;

  panel.innerHTML = entries.slice(0,12).map(({ ticker, count, z }, i) => {
    const barW = Math.round((count/maxC)*100);
    const zc = zClass(z);
    return `<div class="tr-row" data-ticker="${ticker}">
      <div class="tr-rank">${i+1}</div>
      <div class="tr-ticker">${ticker}</div>
      <div class="tr-bar-wrap"><div class="tr-bar" style="width:${barW}%"></div></div>
      <div class="tr-count">${count}</div>
      <div class="tr-z zbadge ${zc}">${sign(z)}${z.toFixed(1)}σ</div>
    </div>`;
  }).join('');

  panel.querySelectorAll('.tr-row').forEach(el =>
    el.addEventListener('click', () => {
      const t = el.dataset.ticker.toLowerCase();
      const s = signals.find(x => x.term.toLowerCase() === t);
      if(s) selectSignal(s);
      else {
        // Show articles for that ticker via alias
        const aliases = TICKER_ALIASES[el.dataset.ticker] || [];
        const term = aliases[0] || el.dataset.ticker.toLowerCase();
        renderArticles(term);
        document.getElementById('sel-indicator').style.display = 'flex';
        document.getElementById('sel-label').textContent = '▶ '+el.dataset.ticker;
        document.getElementById('art-section-label').textContent = el.dataset.ticker+' ARTICLES';
      }
    })
  );
}

// ── Article feed ───────────────────────────────────────────────────────
function renderArticles(term){
  const feed = document.getElementById('art-feed');
  const badge = document.getElementById('art-badge');
  document.getElementById('art-section-label').textContent = `"${term.toUpperCase()}" ARTICLES`;

  if(!articles.length){
    feed.innerHTML = `<div class="empty">
      <div class="empty-ico">◈</div>
      <div class="empty-txt">NO ARTICLES DATA<br>CHECK articles.json</div></div>`;
    badge.textContent = '0 ART.';
    return;
  }

  const tl = term.toLowerCase();
  // Build regex that matches word boundary or alias
  const aliases = Object.entries(TICKER_ALIASES)
    .find(([k]) => k.toLowerCase()===tl || TICKER_ALIASES[k].includes(tl));
  const patterns = aliases ? [tl, ...aliases[1]] : [tl];
  const regex = new RegExp(patterns.map(p=>p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'i');

  const matched = articles.filter(a => {
    const txt = (a.title||'')+(a.description||'')+(a.headline||'');
    return regex.test(txt);
  }).sort((a,b) => {
    const da = new Date(a.published_at||a.publishedAt||a.date||0);
    const db = new Date(b.published_at||b.publishedAt||b.date||0);
    return db - da;
  }).slice(0, 80);

  badge.textContent = matched.length+' ART.';

  if(!matched.length){
    feed.innerHTML = `<div class="empty">
      <div class="empty-ico">◈</div>
      <div class="empty-txt">NO ARTICLES MATCH<br>"${term.toUpperCase()}"</div></div>`;
    return;
  }

  feed.innerHTML = matched.map(a => {
    const src = (a.publisher||a.source?.name||a.source||'').slice(0,22).toUpperCase();
    const dt = a.published_at||a.publishedAt||a.date;
    const title = a.title||a.headline||'(no title)';
    const url = a.url||'#';
    return `<a class="acard" href="${url}" target="_blank" rel="noopener">
      <div class="acard-top">
        <span class="asrc">${src}</span>
        <span class="atime">${timeSince(dt)}</span>
      </div>
      <div class="atitle">${title}</div>
    </a>`;
  }).join('');
}

document.querySelectorAll('.fbtn').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');

  })
);

// Search
document.getElementById('search').addEventListener('input', () => renderSignalList());

// Chart mode
document.querySelectorAll('.cbtn').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    chartMode = btn.dataset.m;
    if(selTerm) renderChart(selTerm);
  })
);

// Clear
document.getElementById('clr-btn').addEventListener('click', () => {
  selTerm = null;
  document.getElementById('sel-indicator').style.display = 'none';
  document.getElementById('art-section-label').textContent = 'ARTICLES';
  document.getElementById('art-feed').innerHTML =
    `<div class="empty"><div class="empty-ico">◈</div>
     <div class="empty-txt">SELECT A SIGNAL<br>TO VIEW ARTICLES</div></div>`;
  document.getElementById('art-badge').textContent = '—';
  document.getElementById('ctitle').textContent = 'SELECT A SIGNAL TO ANALYZE';
  ['s-today','s-avg','s-z','s-slope'].forEach(id =>
    Object.assign(document.getElementById(id), {textContent:'—', className:'sval'})
  );
  document.querySelectorAll('.sig').forEach(el => el.classList.remove('sel'));
  if(mainChart){ mainChart.destroy(); mainChart = null; }
});

// ── Boot ───────────────────────────────────────────────────────────────
init();
})();
