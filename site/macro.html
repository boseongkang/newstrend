<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Newstrend · Macro Themes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg0:#070b10;--bg1:#0c1220;--bg2:#101828;
  --b1:#1a2840;--b2:#223050;
  --cyan:#00d4ff;--amber:#ffb300;--green:#00e676;--red:#ff4444;--purple:#b380ff;
  --t1:#c8d8e8;--t2:#6a8aa8;--t3:#344a60;
  --fm:'IBM Plex Mono',monospace;--fs:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg0);color:var(--t1);font-family:var(--fs);font-size:13px;
     min-height:100dvh;padding-bottom:40px}

header{height:48px;display:flex;align-items:center;gap:24px;padding:0 24px;
  background:var(--bg1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:10}
.brand{font-family:var(--fm);font-size:14px;font-weight:600;color:var(--cyan);letter-spacing:.06em}
.brand em{color:var(--t3);font-style:normal;font-weight:300;margin-left:6px}
nav{display:flex;gap:2px}
nav a{font-family:var(--fm);font-size:10px;font-weight:500;letter-spacing:.1em;
      text-transform:uppercase;color:var(--t2);text-decoration:none;padding:6px 12px;
      border:1px solid transparent;transition:all .12s}
nav a:hover,nav a.on{color:var(--cyan);border-color:var(--b2);background:var(--bg2)}
.hdr-right{margin-left:auto}
#ts{font-family:var(--fm);font-size:10px;color:var(--t3)}

main{max-width:1400px;margin:0 auto;padding:20px 24px}

/* TOP THEMES */
.top-themes{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.theme-card{background:var(--bg1);border:1px solid var(--b1);padding:14px;
            border-left:4px solid;transition:all .15s;cursor:pointer}
.theme-card:hover{transform:translateY(-2px);background:var(--bg2)}
.theme-card.rank1{border-left-color:var(--green)}
.theme-card.rank2{border-left-color:var(--cyan)}
.theme-card.rank3{border-left-color:var(--amber)}
.theme-card.rank4{border-left-color:var(--purple)}
.theme-card.rank5{border-left-color:var(--t2)}
.theme-emoji{font-size:24px;margin-bottom:8px}
.theme-name{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.08em;
            color:var(--t1);margin-bottom:6px}
.theme-score{font-family:var(--fm);font-size:20px;font-weight:600;color:var(--t1)}
.theme-trend{font-family:var(--fm);font-size:9px;margin-top:4px;letter-spacing:.06em}
.tr-rising{color:var(--green)}
.tr-falling{color:var(--red)}
.tr-stable{color:var(--t3)}
.theme-top-word{font-family:var(--fm);font-size:11px;color:var(--t2);margin-top:6px;
                padding-top:6px;border-top:1px solid var(--b1)}

/* RISING/FALLING bars */
.movers{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.mover-section{background:var(--bg1);border:1px solid var(--b1);padding:16px 20px}
.mover-title{font-family:var(--fm);font-size:11px;font-weight:600;letter-spacing:.12em;
             text-transform:uppercase;margin-bottom:10px}
.mover-rising{color:var(--green)}
.mover-falling{color:var(--red)}
.mover-list{display:flex;flex-wrap:wrap;gap:6px}
.mover-tag{padding:4px 10px;font-family:var(--fm);font-size:10px;font-weight:600;
           border:1px solid;letter-spacing:.06em}
.mover-tag.rising{color:var(--green);border-color:var(--green);background:rgba(0,230,118,.08)}
.mover-tag.falling{color:var(--red);border-color:var(--red);background:rgba(255,68,68,.08)}

/* DETAIL grid */
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1024px){.detail-grid{grid-template-columns:1fr}}

.cat-section{background:var(--bg1);border:1px solid var(--b1)}
.cat-hdr{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;
         align-items:center;justify-content:space-between}
.cat-name{font-family:var(--fm);font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--t1)}
.cat-meta{font-family:var(--fm);font-size:10px;color:var(--t3)}
.cat-body{padding:14px 18px}
.cat-chart{height:80px;margin-bottom:12px}
.cat-active{display:flex;flex-wrap:wrap;gap:5px}
.cat-word{padding:3px 8px;font-family:var(--fm);font-size:10px;
          background:var(--bg2);border:1px solid var(--b1);color:var(--t1)}
.cat-word .z{color:var(--amber);margin-left:5px}

.empty{text-align:center;padding:30px;color:var(--t3);font-family:var(--fm);font-size:11px}
.spinner{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--cyan);
         border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="brand">NEWSTREND <em>// MACRO THEMES</em></div>
  <nav>
    <a href="./index.html">DASHBOARD</a>
    <a href="./signals.html">SIGNALS</a>
    <a href="./predict.html">PREDICT</a>
    <a href="./ticker_detail.html">TICKER</a>
    <a href="./report.html">REPORT</a>
    <a href="./weekly.html">WEEKLY</a>
    <a href="./portfolio.html">PORTFOLIO</a>
    <a href="./macro.html" class="on">MACRO</a>
  </nav>
  <div class="hdr-right"><div id="ts">—</div></div>
</header>

<main>
  <h2 style="font-family:var(--fm);font-size:14px;color:var(--t1);font-weight:600;
             letter-spacing:.08em;margin-bottom:14px">🔥 TODAY'S TOP THEMES</h2>
  <div class="top-themes" id="top-themes">
    <div class="empty"><div class="spinner"></div>Loading themes...</div>
  </div>

  <div class="movers">
    <div class="mover-section">
      <div class="mover-title mover-rising">📈 RISING — past 3 days vs prior</div>
      <div class="mover-list" id="rising-list"><span class="empty">—</span></div>
    </div>
    <div class="mover-section">
      <div class="mover-title mover-falling">📉 FALLING — past 3 days vs prior</div>
      <div class="mover-list" id="falling-list"><span class="empty">—</span></div>
    </div>
  </div>

  <h2 style="font-family:var(--fm);font-size:14px;color:var(--t1);font-weight:600;
             letter-spacing:.08em;margin-bottom:14px;margin-top:24px">📊 ALL THEMES — 30-day trend</h2>
  <div class="detail-grid" id="detail-grid"></div>
</main>

<script>
(function(){
'use strict';
const V = Date.now();

const EMOJI = {
  GEOPOLITICS:"🌍", POLITICS:"🏛️", MACRO:"📈", TRADE:"📦",
  TECH:"💻", ENERGY:"⚡", FINANCE:"💰", CRYPTO:"₿",
  HEALTH:"🏥", DISASTER:"🌪️"
};

async function init(){
  document.getElementById('ts').textContent = 'UPDATED ' +
    new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});

  let data;
  try {
    const r = await fetch(`./data/macro_themes.json?v=${V}`, {cache:'no-store'});
    if (!r.ok) throw new Error();
    data = await r.json();
  } catch(e) {
    document.getElementById('top-themes').innerHTML =
      '<div class="empty">Run: python scripts/macro_themes.py</div>';
    return;
  }

  renderTopThemes(data.top_themes_today || []);
  renderMovers(data.rising_themes || [], data.falling_themes || []);
  renderDetailGrid(data.categories || {});
}

function renderTopThemes(top){
  const html = top.map((t, i) => {
    const emoji = EMOJI[t.category] || '•';
    return `<div class="theme-card rank${i+1}">
      <div class="theme-emoji">${emoji}</div>
      <div class="theme-name">${t.category}</div>
      <div class="theme-score">${t.score.toFixed(1)}<span style="font-size:11px;color:var(--t3)">σ</span></div>
      ${t.top_word ? `<div class="theme-top-word">→ ${t.top_word}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('top-themes').innerHTML =
    html || '<div class="empty">No active themes today</div>';
}

function renderMovers(rising, falling){
  const r = rising.map(c => `<span class="mover-tag rising">${EMOJI[c]||''} ${c}</span>`).join('');
  const f = falling.map(c => `<span class="mover-tag falling">${EMOJI[c]||''} ${c}</span>`).join('');
  document.getElementById('rising-list').innerHTML = r || '<span class="empty">No rising themes</span>';
  document.getElementById('falling-list').innerHTML = f || '<span class="empty">No falling themes</span>';
}

function renderDetailGrid(categories){
  const grid = document.getElementById('detail-grid');
  const sorted = Object.entries(categories).sort((a,b) => b[1].today_score - a[1].today_score);

  const html = sorted.map(([cat, data]) => {
    const trendClass = data.trend === 'rising' ? 'tr-rising' :
                       data.trend === 'falling' ? 'tr-falling' : 'tr-stable';
    const trendArrow = data.trend === 'rising' ? '▲' :
                       data.trend === 'falling' ? '▼' : '─';

    const wordsHtml = (data.active_words || []).map(w =>
      `<span class="cat-word">${w.word}<span class="z">${w.z>0?'+':''}${w.z.toFixed(1)}σ</span></span>`
    ).join('') || '<span style="font-family:var(--fm);font-size:10px;color:var(--t3)">No active words</span>';

    return `<div class="cat-section">
      <div class="cat-hdr">
        <div class="cat-name">${EMOJI[cat]||''} ${cat}</div>
        <div class="cat-meta">
          <span class="${trendClass}">${trendArrow} ${data.trend}</span>
          · today <span style="color:var(--t1)">${data.today_score.toFixed(1)}</span>
          · 7d avg <span style="color:var(--t1)">${data.week_avg.toFixed(1)}</span>
        </div>
      </div>
      <div class="cat-body">
        <div class="cat-chart"><canvas id="chart-${cat}"></canvas></div>
        <div class="cat-active">${wordsHtml}</div>
      </div>
    </div>`;
  }).join('');

  grid.innerHTML = html;

  // 차트 그리기 (DOM 추가 후)
  setTimeout(() => {
    sorted.forEach(([cat, data]) => {
      const canvas = document.getElementById(`chart-${cat}`);
      if (!canvas || !data.daily) return;
      const ctx = canvas.getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.daily.map(d => d.date.slice(5)),
          datasets: [{
            data: data.daily.map(d => d.score),
            borderColor: '#00d4ff',
            backgroundColor: 'rgba(0,212,255,0.1)',
            borderWidth: 1.5,
            fill: true,
            pointRadius: 0,
            tension: 0.3,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {legend: {display:false}, tooltip: {
            backgroundColor:'#0c1220', borderColor:'#1a2840', borderWidth:1,
            titleFont:{family:'IBM Plex Mono',size:9},
            bodyFont:{family:'IBM Plex Mono',size:9},
          }},
          scales: {
            x: {display:false},
            y: {display:false, beginAtZero:true},
          }
        }
      });
    });
  }, 50);
}

init();
})();
</script>
</body>
</html>
